<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Weather app</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
    </div>
    <div id="container">
        <div id="today-container">
            <div id="city-container">
                <h1 id="city"></h1>
                <img id="icon">
            </div>
            <div class="cat-container">
                <h2 style="font-size: larger; margin-bottom: 5px; margin-top: 0;">Temperature</h2>
                <p id="temp-now"></p>
                <p id="appr-temp-now" style="margin: 0; font-size: small;"></p>
            </div>
            <div class="cat-container">
                <h2 style="font-size: larger; margin-bottom: 5px; margin-top: 0;">Humidity</h2>
                <p id="humid-now"><p>
            </div>
            <div class="cat-container">
                <h2 style="font-size: larger; margin-bottom: 5px; margin-top: 0;">Wind</h2>
                <p id="wind-speed"></p>
                <p id="wind-gusts"></p>
                <p id="wind-dir"></p>
                <div id="compass-wrapper" style="aspect-ratio: 1;">
                    <canvas id="compass"></canvas>
                </div>       
            </div>
        </div> 
        <div id="week-container">
            <div id="mode-container">
                <button class="button" id="temp-button">Temperature</button>
                <button class="button" id="wind-button">Wind</button>
                <button class="button" id="humid-button">Humidity</button>
            </div>
            <div id="info-container">
                <div style="flex-direction: row; flex-grow: 1; min-height: 0; padding: 10px">
                    <canvas id="chart" style="flex-grow: 1;"></canvas>
                </div>
                <div id="week">
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="load.js"></script>
</body>
</html>
