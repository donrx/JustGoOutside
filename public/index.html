<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <title>Weather app</title>
</head>
<body>
    <h1 id="city">Loading</h1>
    <div id="week">
        <div class="day">
            <h1 class="name"></h1>
            <h1 class="temp"></h1>
        </div>
    </div>

    <script>
        fetch('api/weather')
        .then(res => res.json())
        .then(data => {
            document.getElementById('city').textContent = data.city;
            
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            const today = new Date();
            const first = today.getDay();

            const week = document.getElementById('week');
            const day = document.querySelector('.day');

            for(let i = 1; i < 7; i++){
                let clone = day.cloneNode(true);
                week.appendChild(clone);
            }

            for(let i = 0; i < week.children.length; i++){
                const name = week.children[i].querySelector('.name');
                const temp = week.children[i].querySelector('.temp');
                name.textContent = days[(first + i) % 7]; 
                temp.textContent = data.temperature[i] + ' Celsius';
            }
        })
        .catch(() => {
            document.getElementById('city').textContent = "Unknown";
        });
    </script>
</body>
</html>
